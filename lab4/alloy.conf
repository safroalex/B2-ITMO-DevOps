// Grafana Alloy: логи Airflow и Spark → Loki

local.file_match "airflow_logs" {
  path_targets = [
    {
      __path__ = "/opt/logs/dag_id=*/**/*.log",
      job      = "airflow",
    },
    {
      __path__ = "/opt/logs/scheduler/**/*.log",
      job      = "airflow",
    },
    {
      __path__ = "/opt/logs/dag_processor_manager/**/*.log",
      job      = "airflow",
    },
  ]
}

loki.source.file "airflow" {
  targets    = local.file_match.airflow_logs.targets
  forward_to = [loki.write.default.receiver]
}

local.file_match "spark_logs" {
  path_targets = [
    {
      __path__    = "/opt/logs/spark-master/**/*.log",
      job         = "spark",
      component   = "master",
    },
    {
      __path__    = "/opt/logs/spark-worker/**/*.log",
      job         = "spark",
      component   = "worker",
    },
  ]
}

loki.source.file "spark" {
  targets    = local.file_match.spark_logs.targets
  forward_to = [loki.write.default.receiver]
}

loki.write "default" {
  endpoint {
    url = "http://loki:3100/loki/api/v1/push"
  }
}
