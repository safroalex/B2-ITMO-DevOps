// Grafana Alloy config: collect Airflow task logs and push to Loki

local.file_match "airflow_logs" {
  path_targets = [{
    __path__ = "/opt/logs/**/*.log",
    job      = "airflow",
  }]
}

loki.source.file "airflow" {
  targets    = local.file_match.airflow_logs.targets
  forward_to = [loki.write.default.receiver]
}

loki.write "default" {
  endpoint {
    url = "http://loki:3100/loki/api/v1/push"
  }
}
